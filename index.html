<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stack Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="viewport">
    <video class="bg-video" loop autoplay muted playsinline>
      <source src="bgbg.webm" type="video/webm">
    </video>
    <div class="scroll-container">
      <div class="spacer"></div>
    </div>

    <div class="cards-wrapper">
      <div class="card card-1">
        <img src="页面1.png" alt="页面1">
      </div>
      <div class="card card-2">
        <img src="页面2.png" alt="页面2">
      </div>
      <div class="card card-3">
        <img src="页面3.png" alt="页面3">
      </div>
      <div class="card card-4">
        <img src="页面4.png" alt="页面4">
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
